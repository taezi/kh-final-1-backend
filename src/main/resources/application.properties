spring.application.name=final-1

server.port=9999
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.username=C##KH_JAVA_FINAL_1
spring.datasource.password=${DB_PASSWORD}


mybatis.mapper-locations=classpath:mappers/**/*.xml
mybatis.type-aliases-package=com.kh.dto
mybatis.configuration.map-underscore-to-camel-case=true

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=100MB

jwt.secret=${JWT_SECRET}
jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION}
jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION}

cors.allowed-origin=http://localhost:3000

google.genai.api-key=${GOOGLE_GENAI_API_KEY}
weather.api.key=${WEATHER_API_KEY}
weather.location.seoul.nx=60
weather.location.seoul.ny=127

seoul.api.key=${SEOUL_API_KEY}
tmdb.api.key=${TMDB_API_KEY}
kakao.api.rest-api-key=${KAKAO_API_REST_KEY}


# (?? ?? ? ??)
logging.level.com.kh=INFO
logging.level.com.kh.controller=DEBUG
logging.level.com.kh.service=DEBUG
logging.level.com.kh.mapper=DEBUG

# MyBatis SQL ?? (?? ??)
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl




google.places.api-key=${GOOGLE_PLACES_API_KEY}
# application.properties
logging.level.com.kh.mapper=DEBUG

cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID}
cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY}
cloud.aws.region.static=${AWS_REGION}